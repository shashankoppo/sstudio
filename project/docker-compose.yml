version: '3.8'

services:
  sstudio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sstudio-production
    restart: unless-stopped
    ports:
      - "80:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Map the data directory inside container so SQLite database persists outside restarts
      - ./server/data:/app/server/data
